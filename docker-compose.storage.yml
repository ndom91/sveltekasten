services:
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.89
    command: server /data
    networks:
      - briefkasten
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=${BUCKET_ACCESS_KEY:-AKIAIOSFODNN7EXAMPLE}
      - RUSTFS_SECRET_KEY=${BUCKET_SECRET_KEY:-wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
    volumes:
      # RustFS runs as UID/GID 10001 - the host ./data dir must be writable by it
      - ./data:/data
  mc:
    image: minio/mc:latest
    networks:
      - briefkasten
    depends_on:
      - rustfs
    environment:
      - BUCKET_ACCESS_KEY=${BUCKET_ACCESS_KEY:-AKIAIOSFODNN7EXAMPLE}
      - BUCKET_SECRET_KEY=${BUCKET_SECRET_KEY:-wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
      - BUCKET_NAME=${BUCKET_NAME:-briefkasten}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://rustfs:9000 $${BUCKET_ACCESS_KEY} $${BUCKET_SECRET_KEY}; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/$${BUCKET_NAME};
      /usr/bin/mc anonymous set download local/$${BUCKET_NAME};
      "
  database:
    image: postgres:18
    networks:
      - briefkasten
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-briefkasten}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - database:/var/lib/postgresql/data

volumes:
  database:

networks:
  briefkasten:
